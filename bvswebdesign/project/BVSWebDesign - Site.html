<style>
  html, body { margin: 0; padding: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --claret: #6a1a2c;
    --claret-deep: #4a0f1d;
    --blue: #16365a;
    --blue-deep: #0c2340;
    --accent-a: var(--claret);
    --accent-a-deep: var(--claret-deep);
    --accent-b: var(--blue);
    --accent-b-deep: var(--blue-deep);
    /* Brighter accent used only inside dark sections so claret/blue reads */
    --accent-bright: #d06a80;
    /* Headline (display) font — swappable via Tweaks; body serif stays Newsreader */
    --font-display: "Newsreader", "Iowan Old Style", Georgia, serif;

    --paper: #f4f3ee;
    --paper-2: #ecebe4;
    --paper-3: #e3e1d8;
    --ink: #14130e;
    --ink-2: #3a3830;
    --ink-3: rgba(20,19,14,0.55);
    --rule: rgba(20,19,14,0.16);
    --rule-soft: rgba(20,19,14,0.09);
    --dark-bg: #14130e;
    --dark-paper: #f6f5f0;
  }
  [data-accent="blue"] {
    --accent-a: var(--blue);
    --accent-a-deep: var(--blue-deep);
    --accent-b: var(--claret);
    --accent-b-deep: var(--claret-deep);
    --accent-bright: #6ba6dd;
  }

  /* Headline font options */
  [data-display="instrument"] { --font-display: "Instrument Serif", Georgia, serif; }
  [data-display="dmserif"]    { --font-display: "DM Serif Display", Georgia, serif; }
  [data-display="cormorant"]  { --font-display: "Cormorant Garamond", Georgia, serif; }
  [data-display="bricolage"]  { --font-display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif; }
  [data-bg="stone"]     { --paper:#f4f3ee; --paper-2:#ecebe4; --paper-3:#e3e1d8; --ink:#14130e; --rule:rgba(20,19,14,0.16); --rule-soft:rgba(20,19,14,0.09); }
  [data-bg="cool"]      { --paper:#f6f7f5; --paper-2:#eef0ec; --paper-3:#e4e7e1; --ink:#0d1410; --rule:rgba(13,20,16,0.14); --rule-soft:rgba(13,20,16,0.08); }
  [data-bg="white"]     { --paper:#ffffff; --paper-2:#f6f6f4; --paper-3:#ededea; --ink:#0a0a08; --rule:rgba(10,10,8,0.14); --rule-soft:rgba(10,10,8,0.08); }
  [data-bg="newsprint"] { --paper:#e9e5db; --paper-2:#dfdbcf; --paper-3:#d4cfbf; --ink:#14130e; --rule:rgba(20,19,14,0.20); --rule-soft:rgba(20,19,14,0.10); }

  h1, h2, h3, h4, p { margin: 0; }
  a { color: inherit; }
  .serif { font-family: "Newsreader", "Iowan Old Style", Georgia, serif; }
  .mono  { font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  /* Big headlines use the swappable display font; body serif copy stays Newsreader */
  h1.serif, h2.serif { font-family: var(--font-display); }
  /* The alternative display fonts vary a lot in apparent size and vertical
     metrics. Normalise their x-height so they read at a consistent size, and
     loosen the sub-1 line-heights just enough to stop tall glyphs/descenders
     overlapping the next element. Newsreader (default, no data-display attr)
     keeps its tightly-tuned per-headline line-heights untouched. */
  [data-display] h1.serif,
  [data-display] h2.serif {
    font-size-adjust: 0.46;
    line-height: 1.07 !important;
  }

  .label {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
  }
  .label--accent { color: var(--accent-a); font-weight: 500; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Geist"; font-size: 14px; font-weight: 500;
    padding: 13px 22px; border-radius: 999px;
    text-decoration: none; letter-spacing: 0.005em;
    transition: transform .15s, background .15s, color .15s; cursor: pointer; border: none;
  }
  .btn--solid { background: var(--ink); color: var(--paper); }
  .btn--solid:hover { transform: translateY(-1px); background: var(--accent-a); color: var(--dark-paper); }
  .btn--accent { background: var(--accent-a); color: var(--dark-paper); }
  .btn--accent:hover { transform: translateY(-1px); background: var(--accent-a-deep); }
  .btn--ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .btn--ghost:hover { background: var(--ink); color: var(--paper); }
  .btn--ghost-dark { background: transparent; color: var(--dark-paper); border: 1px solid rgba(255,255,255,0.3); }
  .btn--ghost-dark:hover { background: rgba(255,255,255,0.1); }

  .underlink {
    font-family: "Newsreader"; font-style: italic; font-size: 16px;
    text-decoration: none; color: var(--ink);
    border-bottom: 1px solid var(--accent-a); padding-bottom: 2px; transition: color .15s;
    cursor: pointer;
  }
  .underlink:hover { color: var(--accent-a); }

  .gutter { padding-left: 56px; padding-right: 56px; }

  /* Inside dark sections, remap the accent to its brighter tone so it reads */
  .dark { background: var(--dark-bg); color: var(--dark-paper); --accent-a: var(--accent-bright); }
  .dark .label { color: rgba(255,255,255,0.55); }
  .dark .label--accent { color: var(--accent-a); }
  /* On dark, the accent button is bright with dark text for maximum pop */
  .dark .btn--accent { color: var(--dark-bg); }
  .dark .btn--accent:hover { background: var(--accent-a-deep); color: var(--dark-paper); }
  .dark .btn--solid:hover { color: var(--dark-bg); }

  .ph {
    background: repeating-linear-gradient(135deg, rgba(20,19,14,0.05) 0 14px, rgba(20,19,14,0.10) 14px 28px);
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-family: "Geist Mono"; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(20,19,14,0.5); text-align: center;
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 6px; }
</style>
