<title>BVSWebDesign — Design Directions</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,300..700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

<style>
  html, body { margin:0; padding:0; background:#e9e4d8; }
  body { font-family: ui-sans-serif, system-ui; }
  * { box-sizing: border-box; }

  /* Shared accent tokens — flipped by the Tweaks panel */
  :root {
    --claret: #6e1a2c;
    --claret-deep: #4f1220;
    --blue: #1d3a5f;
    --blue-deep: #0f2742;
    --paper: #f5efe1;
    --paper-2: #efe7d4;
    --ink: #1c170f;
    --ink-2: #3a3327;
    --rule: rgba(28,23,15,0.14);
    /* dominance: when accent-a = claret, accent-b = blue (default), and vice versa */
    --accent-a: var(--claret);
    --accent-a-deep: var(--claret-deep);
    --accent-b: var(--blue);
    --accent-b-deep: var(--blue-deep);
  }
  [data-accent="blue-dominant"] {
    --accent-a: var(--blue);
    --accent-a-deep: var(--blue-deep);
    --accent-b: var(--claret);
    --accent-b-deep: var(--claret-deep);
  }

  /* Hide scrollbars inside artboards */
  .dc-card * { scrollbar-width: none; }
  .dc-card *::-webkit-scrollbar { display: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
